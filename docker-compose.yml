services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-kleinanzeigen_login}
      MYSQL_USER: ${DB_USER:-klein}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env}
    volumes:
      - klein_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-kleinanzeigen_login}
      DB_USER: ${DB_USER:-klein}
      DB_PASSWORD: ${DB_PASSWORD}
      BASE_URL: ${BASE_URL}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_SUPER_ADMINS: ${TELEGRAM_SUPER_ADMINS}
      SETUP_ON_START: ${SETUP_ON_START:-1}
    volumes:
      - .:/var/www/html
    # Plain HTTP mode (no Caddy): map host 80 → app
    ports:
      - "${HTTP_PORT:-8080}:80"
    profiles:
      - http

  # Full stack with automatic HTTPS (Let's Encrypt via Caddy)
  app_ssl:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-kleinanzeigen_login}
      DB_USER: ${DB_USER:-klein}
      DB_PASSWORD: ${DB_PASSWORD}
      BASE_URL: ${BASE_URL}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_SUPER_ADMINS: ${TELEGRAM_SUPER_ADMINS}
      SETUP_ON_START: ${SETUP_ON_START:-1}
    volumes:
      - .:/var/www/html
    expose:
      - "80"
    profiles:
      - ssl

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app_ssl
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    profiles:
      - ssl

volumes:
  klein_mysql_data:
  caddy_data:
  caddy_config:
